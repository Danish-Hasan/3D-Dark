<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Customer Entry Form</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0c10;
    --panel:     #13151a;
    --card:      #1a1d24;
    --border:    #2a2d36;
    --accent:    #00e5a0;
    --accent2:   #00b8ff;
    --danger:    #ff4f6a;
    --text:      #eef0f6;
    --muted:     #6b7080;
    --success-bg:#0a2a1f;
    --radius:    16px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
    position: relative;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0,229,160,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 10% 80%, rgba(0,184,255,0.06) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 580px;
    padding: 48px 0 32px;
    position: relative;
    z-index: 1;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .brand-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(0.8); }
  }

  .brand-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  h1 span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 10px;
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 580px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(0,229,160,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── Form ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  label .req { color: var(--accent); font-size: 14px; line-height: 1; }

  input, textarea, select {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 13px 16px;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  input::placeholder, textarea::placeholder { color: var(--muted); }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.12);
    background: #16191f;
  }

  input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255,79,106,0.12); }

  textarea { resize: vertical; min-height: 88px; line-height: 1.5; }

  .price-wrap {
    position: relative;
  }

  .price-wrap .symbol {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 15px;
    font-weight: 600;
    pointer-events: none;
  }

  .price-wrap input { padding-left: 30px; }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
    grid-column: 1 / -1;
  }

  /* ── Submit ── */
  .btn-submit {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 15px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-submit:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(0,229,160,0.3);
  }

  .btn-submit:active:not(:disabled) { transform: translateY(0); }

  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-submit .spinner {
    width: 16px; height: 16px;
    border: 2.5px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-submit.loading .spinner { display: block; }
  .btn-submit.loading .btn-text { opacity: 0.6; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 22px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    z-index: 999;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    max-width: 90vw;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent); }
  .toast.error   { border-color: var(--danger); }
  .toast .icon   { font-size: 18px; }

  /* ── Success card ── */
  .success-banner {
    display: none;
    background: var(--success-bg);
    border: 1px solid rgba(0,229,160,0.3);
    border-radius: 12px;
    padding: 18px 20px;
    margin-top: 20px;
    grid-column: 1 / -1;
    animation: fadeIn 0.4s ease;
  }

  .success-banner.show { display: block; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .success-banner h3 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .id-badge {
    display: inline-block;
    background: rgba(0,229,160,0.15);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,0.3);
    border-radius: 6px;
    padding: 4px 12px;
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 4px 0 8px;
  }

  .success-meta {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Recent entries ── */
  .recent-section {
    width: 100%;
    max-width: 580px;
    margin-top: 28px;
    position: relative;
    z-index: 1;
  }

  .recent-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .recent-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, color 0.2s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .entries-list { display: flex; flex-direction: column; gap: 10px; }

  .entry-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    animation: fadeIn 0.3s ease;
  }

  .entry-id {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(0,229,160,0.1);
    padding: 3px 8px;
    border-radius: 5px;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .entry-info .name {
    font-size: 14px;
    font-weight: 500;
  }

  .entry-info .product {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .entry-price {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
    text-align: right;
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    padding: 28px;
    color: var(--muted);
    font-size: 14px;
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }

  /* ── Responsive ── */
  @media (max-width: 500px) {
    .card { padding: 24px 18px; }
    .form-grid { grid-template-columns: 1fr; }
    .field.full { grid-column: 1; }
    .divider, .btn-submit, .success-banner { grid-column: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-label">Live System</span>
  </div>
  <h1>Customer<br/><span>Entry Form</span></h1>
  <p class="subtitle">Fills directly into your Google Sheet — from any device.</p>
</header>

<div class="card">
  <form id="customerForm" novalidate>
    <div class="form-grid">

      <div class="field">
        <label>Full Name <span class="req">*</span></label>
        <input type="text" id="name" placeholder="e.g. Amit Sharma" autocomplete="name"/>
      </div>

      <div class="field">
        <label>Product <span class="req">*</span></label>
        <input type="text" id="product" placeholder="e.g. Laptop"/>
      </div>

      <div class="field full">
        <label>Address <span class="req">*</span></label>
        <textarea id="address" placeholder="Full address — street, city, state…"></textarea>
      </div>

      <div class="field">
        <label>Price <span class="req">*</span></label>
        <div class="price-wrap">
          <span class="symbol">₹</span>
          <input type="number" id="price" placeholder="0.00" min="0" step="0.01"/>
        </div>
      </div>

      <div class="field" style="justify-content:flex-end;">
        <label style="visibility:hidden">x</label>
        <div style="background:var(--panel);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;">
          <span style="font-size:16px;">🪪</span>
          ID auto-generated
        </div>
      </div>

      <div class="divider"></div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <div class="spinner"></div>
        <span class="btn-text">Save to Google Sheets →</span>
      </button>

      <div class="success-banner" id="successBanner">
        <h3>✅ Customer Saved!</h3>
        <div class="id-badge" id="generatedId">—</div>
        <div class="success-meta" id="savedTime"></div>
      </div>

    </div>
  </form>
</div>

<!-- Recent entries -->
<div class="recent-section">
  <div class="recent-header">
    <h2>Recent Entries</h2>
    <button class="refresh-btn" onclick="loadRecent()">↻ Refresh</button>
  </div>
  <div class="entries-list" id="entriesList">
    <div class="empty-state">Loading recent entries…</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="icon" id="toastIcon"></span>
  <span id="toastMsg"></span>
</div>

<script>
  const API = "";  // Empty = same server (relative URL)

  /* ── Toast ── */
  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    document.getElementById("toastMsg").textContent = msg;
    document.getElementById("toastIcon").textContent = type === "success" ? "✅" : "❌";
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove("show"), 3500);
  }

  /* ── Validation ── */
  function validate() {
    let ok = true;
    ["name", "address", "product", "price"].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove("error");
      if (!el.value.trim()) { el.classList.add("error"); ok = false; }
    });
    const price = document.getElementById("price");
    if (price.value && isNaN(parseFloat(price.value))) {
      price.classList.add("error"); ok = false;
    }
    return ok;
  }

  /* ── Submit ── */
  document.getElementById("customerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!validate()) { showToast("Please fill in all fields.", "error"); return; }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.classList.add("loading");
    btn.querySelector(".btn-text").textContent = "Saving…";

    const payload = {
      name:    document.getElementById("name").value.trim(),
      address: document.getElementById("address").value.trim(),
      product: document.getElementById("product").value.trim(),
      price:   document.getElementById("price").value.trim()
    };

    try {
      const res  = await fetch(`${API}/submit`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById("generatedId").textContent = data.customer_id;
        document.getElementById("savedTime").textContent   = "Saved on " + data.timestamp;
        document.getElementById("successBanner").classList.add("show");
        showToast(`Saved as ${data.customer_id}`);
        document.getElementById("customerForm").reset();
        loadRecent();
      } else {
        showToast(data.message || "Something went wrong.", "error");
      }
    } catch (err) {
      showToast("Cannot reach server. Is server.py running?", "error");
    } finally {
      btn.disabled = false;
      btn.classList.remove("loading");
      btn.querySelector(".btn-text").textContent = "Save to Google Sheets →";
    }
  });

  /* ── Load recent ── */
  async function loadRecent() {
    const list = document.getElementById("entriesList");
    try {
      const res  = await fetch(`${API}/customers`);
      const data = await res.json();
      if (!data.success || !data.customers.length) {
        list.innerHTML = '<div class="empty-state">No entries yet. Add your first customer above!</div>';
        return;
      }
      const recent = data.customers.slice(-5).reverse();
      list.innerHTML = recent.map(c => `
        <div class="entry-row">
          <span class="entry-id">${c["Customer ID"] || "—"}</span>
          <div class="entry-info">
            <div class="name">${c["Name"] || "—"}</div>
            <div class="product">${c["Product"] || "—"} · ${c["Address"] ? c["Address"].substring(0,30) + "…" : ""}</div>
          </div>
          <div class="entry-price">₹${parseFloat(c["Price (₹)"] || 0).toLocaleString("en-IN")}</div>
        </div>
      `).join("");
    } catch {
      list.innerHTML = '<div class="empty-state">Could not load entries. Make sure server.py is running.</div>';
    }
  }

  /* Clear error on type */
  ["name","address","product","price"].forEach(id => {
    document.getElementById(id).addEventListener("input", function() {
      this.classList.remove("error");
    });
  });

  loadRecent();
</script>
</body>
</html>
